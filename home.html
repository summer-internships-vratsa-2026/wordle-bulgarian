<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle България</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #121213;
            font-family: Arial, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            color: #fff;
            margin: 0;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(5, 60px);
            gap: 5px;
            margin-bottom: 20px;
        }

        .tile {
            width: 60px;
            height: 60px;
            border: 2px solid #565758;
            background: #121213;
            color: #fff;
            font-size: 32px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tile.correct {
            background: #538d4e;
            border-color: #538d4e;
        }

        .tile.present {
            background: #b59f3b;
            border-color: #b59f3b;
        }

        .tile.absent {
            background: #3a3a3c;
            border-color: #565758;
        }

        .keyboard {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
            max-width: 760px;
            padding: 10px 0;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .key-row {
            display: flex;
            gap: 6px;
            justify-content: center;
        }

        .toggle-button,
        .settings-button,
        .close-settings {
            padding: 10px 16px;
            background: #538d4e;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }

        .settings-button {
            display: none;
            width: 100%;
            max-width: 320px;
        }

        .settings-panel {
            display: none;
            position: fixed;
            inset: 0;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            padding: 20px;
        }

        @media (max-width: 560px) {
            #toggleKeyboard {
                display: none;
            }

            .settings-button {
                display: inline-flex;
            }
        }

        .settings-panel.show {
            display: flex;
        }

        .settings-content {
            width: 100%;
            max-width: 320px;
            background: #1e1e1e;
            border: 1px solid #565758;
            border-radius: 12px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .settings-content h3 {
            color: #fff;
            margin: 0;
            font-size: 18px;
            text-align: center;
        }

        .settings-content .toggle-button {
            margin-top: 0;
        }

        .toggle-button:hover,
        .settings-button:hover,
        .close-settings:hover {
            background: #6ba85f;
        }

        .key {
            padding: 10px 8px;
            background: #818384;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            flex: 1 0 0;
            min-width: 32px;
            height: 52px;
            transition: background 0.2s, transform 0.12s;
        }

        .key:hover {
            transform: translateY(-1px);
            background: #9ca3af;
        }

        .key.wide {
            min-width: 68px;
            flex: 1.4 0 0;
            padding: 0 14px;
        }

        .key.correct {
            background: #538d4e;
        }

        .key.present {
            background: #b59f3b;
        }

        .key.absent {
            background: #3a3a3c;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #565758;
            min-width: 300px;
        }

        .modal-content h2 {
            color: #fff;
            margin: 0 0 20px 0;
            font-size: 32px;
        }

        .modal-content p {
            color: #aaa;
            margin: 10px 0;
            font-size: 18px;
        }

        .modal-content button {
            background: #538d4e;
            color: #fff;
            border: none;
            padding: 12px 30px;
            margin-top: 20px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .modal-content button:hover {
            background: #6ba85f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Wordle България</h1>
        <div id="board"></div>
        <div class="keyboard">
            <div class="key-row" id="row-1"></div>
            <div class="key-row" id="row-2"></div>
            <div class="key-row" id="row-3"></div>
        </div>
        <button id="toggleKeyboard" class="toggle-button">Смени клавиатура</button>
        <button id="openSettings" class="settings-button">Настройки</button>
    </div>
    <div id="settingsPanel" class="settings-panel">
        <div class="settings-content">
            <h3>Телефонни настройки</h3>
            <button id="toggleKeyboardMobile" class="toggle-button">Промени клавиатура</button>
            <button id="closeSettings" class="close-settings">Затваряне</button>
        </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Поздравления!</h2>
            <p id="modalMessage"></p>
            <button onclick="location.reload()">Нова Игра</button>
        </div>
    </div>

    <script>
        // 1. Setup Variables
        let validWords = [];
        let secretWord = "";
        let gameOver = true;
        let currentRow = 0;
        let currentCol = 0;
        let currentGuess = "";

        // 2. Load Words from File
        async function initializeGame() {
            try {
                const response = await fetch('words.txt');
                const text = await response.text();
                validWords = text.split(/\r?\n/)
                                 .map(w => w.trim().toUpperCase())
                                 .filter(w => w.length === 5);
                
                if (validWords.length === 0) throw new Error("No words found");
                
                secretWord = validWords[Math.floor(Math.random() * validWords.length)];
                gameOver = false;
                console.log("Game Loaded. Secret Word: " + secretWord);
            } catch (e) {
                console.error(e);
                alert("Error loading words.txt. Make sure it is in the same folder and you are using a server.");
            }
        }
        initializeGame();

        // 3. Setup Board and Keyboard
        const board = document.getElementById("board");
        for (let r = 0; r < 6; r++) {
            for (let c = 0; c < 5; c++) {
                let tile = document.createElement("div");
                tile.id = `${r}-${c}`;
                tile.classList.add("tile");
                board.appendChild(tile);
            }
        }

        const keyboardLayouts = {
            yavert: [
                ["Я", "В", "Е", "Р", "Т", "Ъ", "Й", "Ц", "У", "К"],
                ["А", "С", "Д", "Ф", "Г", "Х", "Ж", "З", "И", "О"],
                ["ENTER", "П", "Л", "Ь", "Щ", "Ш", "Н", "М", "Б", "Ю", "Ч", "BACK"]
            ],
            second: [
                ["У", "Е", "Ш", "Щ", "З", "Х", "Ъ", "Й", "Ц", "К"],
                ["А", "С", "Д", "Ф", "Г", "Ж", "И", "О", "П", "М"],
                ["ENTER", "Я", "Ч", "С", "Т", "Ь", "Б", "Ю", "Н", "В", "BACK"]
            ]
        };

        let currentLayout = "yavert";

        function renderKeyboard(layoutName) {
            [1, 2, 3].forEach(index => {
                document.getElementById(`row-${index}`).innerHTML = "";
            });

            keyboardLayouts[layoutName].forEach((row, rowIndex) => {
                const rowEl = document.getElementById(`row-${rowIndex + 1}`);
                row.forEach(key => {
                    const btn = document.createElement("button");
                    btn.innerText = key;
                    btn.classList.add("key");
                    if (key === "ENTER" || key === "BACK") btn.classList.add("wide");
                    btn.addEventListener("click", () => handleInput(key));
                    rowEl.appendChild(btn);
                });
            });
        }

        document.getElementById("toggleKeyboard").addEventListener("click", () => {
            currentLayout = currentLayout === "yavert" ? "second" : "yavert";
            renderKeyboard(currentLayout);
        });

        document.getElementById("openSettings").addEventListener("click", () => {
            document.getElementById("settingsPanel").classList.add("show");
        });

        document.getElementById("closeSettings").addEventListener("click", () => {
            document.getElementById("settingsPanel").classList.remove("show");
        });

        document.getElementById("toggleKeyboardMobile").addEventListener("click", () => {
            currentLayout = currentLayout === "yavert" ? "second" : "yavert";
            renderKeyboard(currentLayout);
            document.getElementById("settingsPanel").classList.remove("show");
        });

        renderKeyboard(currentLayout);

        // 4. Input Handling
        window.addEventListener("keyup", (e) => {
            if (gameOver) return;
            if (e.key === "Enter") handleInput("ENTER");
            else if (e.key === "Backspace") handleInput("BACK");
            else if (/^[а-яА-ЯъЪьЬшШщЩчЧюЮяЯ]$/.test(e.key)) handleInput(e.key.toUpperCase());
        });

        function handleInput(key) {
            if (gameOver) return;
            if (key === "BACK") {
                if (currentCol > 0) {
                    currentCol--;
                    const tile = document.getElementById(`${currentRow}-${currentCol}`);
                    tile.innerText = "";
                    currentGuess = currentGuess.slice(0, -1);
                }
            } else if (key === "ENTER") {
                if (currentGuess.length === 5) checkWord();
                else showModal("Грешка", "Недостатъчно букви!");
            } else if (currentCol < 5) {
                const tile = document.getElementById(`${currentRow}-${currentCol}`);
                tile.innerText = key;
                currentGuess += key;
                currentCol++;
            }
        }

        // 5. Game Logic
        function checkWord() {
            if (!validWords.includes(currentGuess)) {
                showModal("Грешка", "Думата я няма в списъка!");
                // Reset current row for retry
                for (let i = 0; i < 5; i++) {
                    const tile = document.getElementById(`${currentRow}-${i}`);
                    tile.innerText = "";
                }
                currentCol = 0;
                currentGuess = "";
                return;
            }

            let tempSecret = secretWord.split("");
            let statuses = Array(5).fill("absent");

            // First pass: Correct letters (Green)
            for (let i = 0; i < 5; i++) {
                if (currentGuess[i] === tempSecret[i]) {
                    statuses[i] = "correct";
                    tempSecret[i] = null;
                }
            }

            // Second pass: Present letters (Yellow)
            for (let i = 0; i < 5; i++) {
                if (statuses[i] !== "correct" && tempSecret.includes(currentGuess[i])) {
                    statuses[i] = "present";
                    tempSecret[tempSecret.indexOf(currentGuess[i])] = null;
                }
            }

            // Update UI
            for (let i = 0; i < 5; i++) {
                const tile = document.getElementById(`${currentRow}-${i}`);
                tile.classList.add(statuses[i]);
                updateKeyboard(currentGuess[i], statuses[i]);
            }

            // Win/Loss
            if (currentGuess === secretWord) {
                showModal("Поздравления!", "Вие спечелихте!");
                gameOver = true;
            } else if (currentRow === 5) {
                showModal("Край на играта", "Думата беше: " + secretWord);
                gameOver = true;
            } else {
                currentRow++;
                currentCol = 0;
                currentGuess = "";
            }
        }

        function showModal(title, message) {
            document.getElementById("modalTitle").innerText = title;
            document.getElementById("modalMessage").innerText = message;
            document.getElementById("gameModal").classList.add("show");
        }

        function updateKeyboard(letter, status) {
            const btn = Array.from(document.querySelectorAll(".key")).find(k => k.innerText === letter);
            if (btn) {
                if (status === "correct") btn.className = "key correct";
                else if (status === "present" && !btn.classList.contains("correct")) btn.className = "key present";
                else if (status === "absent" && !btn.classList.contains("correct") && !btn.classList.contains("present")) btn.className = "key absent";
            }
        }
    </script>
</body>
</html>
