<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle България</title>
        <style>
        :root {
            --bg: #121213;
            --text: #ffffff;
            --tile-bg: #121213;
            --tile-border: #3a3a3c;
            --key-bg: #818384;
            --key-text: #ffffff;
            --modal-bg: #1e1e1e;
            --correct: #538d4e;
            --present: #b59f3b;
            --absent: #3a3a3c;
            --absent-border: #565758;
            --header-border: #3a3a3c;
            --key-height: 58px;
            --key-gap: 6px;
            --key-font-size: 14px;
            --keyboard-padding: 10px;
        }

        body.light-mode {
            --bg: #ffffff;
            --text: #1a1a1b;
            --tile-bg: #ffffff;
            --tile-border: #d3d6da;
            --key-bg: #d3d6da;
            --key-text: #1a1a1b;
            --modal-bg: #ffffff;
            --absent: #787c7e;
            --absent-border: #787c7e;
            --header-border: #d3d6da;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            transition: background 0.3s ease, color 0.3s ease;
        }

        header {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 50px;
            border-bottom: 1px solid var(--header-border);
            margin-bottom: 20px;
            position: relative;
        }

        h1 {
            font-size: 32px;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #themeToggle {
            position: absolute;
            right: 20px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        #themeToggle:hover {
            background: rgba(128, 128, 128, 0.2);
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            padding: 10px;
            box-sizing: border-box;
            width: 350px;
            max-width: 100%;
            margin-bottom: auto;
        }

        .tile {
            width: 100%;
            aspect-ratio: 1;
            border: 2px solid var(--tile-border);
            background: var(--tile-bg);
            color: var(--text);
            font-size: 2rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .tile.correct {
            background: var(--correct);
            border-color: var(--correct);
            color: #fff;
        }

        .tile.present {
            background: var(--present);
            border-color: var(--present);
            color: #fff;
        }

        .tile.absent {
            background: var(--absent);
            border-color: var(--absent-border);
            color: #fff;
        }

        .keyboard {
            display: flex;
            flex-direction: column;
            gap: var(--key-gap);
            width: 100%;
            padding: var(--keyboard-padding);
            box-sizing: border-box;
            margin-top: 20px;
            user-select: none;
            -webkit-user-select: none;
        }

        .key-row {
            display: flex;
            gap: var(--key-gap);
            justify-content: center;
            width: 100%;
        }

        .key {
            background: var(--key-bg);
            color: var(--key-text);
            border: none;
            border-radius: 4px;
            padding: 0;
            height: var(--key-height);
            flex: 1;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: var(--key-font-size);
            transition: background-color 0.15s ease, color 0.15s ease, transform 0.05s ease, filter 0.05s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
        }

        @media (hover: hover) {
            .key:hover {
                filter: brightness(1.1);
            }
        }

        .key:active {
            transform: scale(0.92);
            filter: brightness(0.9);
        }

        .key.wide {
            flex: 1.5;
        }

        .key.correct { background: var(--correct); color: #fff; }
        .key.present { background: var(--present); color: #fff; }
        .key.absent { background: var(--absent); color: #fff; }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
        }

        .toggle-button,
        .settings-button,
        .close-settings {
            padding: 12px 20px;
            background: var(--correct);
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }

        .settings-button {
            display: none;
        }

        /* Mobile specific adjustments */
        @media (max-width: 600px) {
            #themeToggle {
                display: none; /* Hide top-right toggle on phone */
            }

            #toggleKeyboard {
                display: none;
            }

            .settings-button {
                display: block;
            }

            #board {
                width: 100%;
                max-width: 300px;
            }

            :root {
                --key-height: 48px;
                --key-gap: 5px;
                --key-font-size: 13px;
                --keyboard-padding: 8px;
            }
            
            .key.wide {
                font-size: 11px;
            }
        }

        @media (max-width: 400px) {
            :root {
                --key-height: 44px;
                --key-gap: 4px;
                --key-font-size: 11px;
                --keyboard-padding: 4px;
            }
            
            .key.wide {
                font-size: 9px;
            }
        }

        @media (max-width: 340px) {
            :root {
                --key-height: 38px;
                --key-gap: 3px;
                --key-font-size: 10px;
                --keyboard-padding: 2px;
            }
            
            .key.wide {
                font-size: 8px;
            }
        }

        /* Settings Panel */
        .settings-panel {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .settings-panel.show {
            display: flex;
        }

        .settings-content {
            background: var(--modal-bg);
            padding: 30px;
            border-radius: 12px;
            width: 80%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 4px 23px 0 rgba(0,0,0,0.2);
        }
        
        .settings-content h3 {
            margin-top: 0;
        }


        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #565758;
            min-width: 300px;
        }

        .modal-content h2 {
            color: #fff;
            margin: 0 0 20px 0;
            font-size: 32px;
        }

        .modal-content p {
            color: #aaa;
            margin: 10px 0;
            font-size: 18px;
        }

        .modal-content button {
            background: #538d4e;
            color: #fff;
            border: none;
            padding: 12px 30px;
            margin-top: 20px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .modal-content button:hover {
            background: #6ba85f;
        }

        .status-message {
            min-height: 22px;
            color: #f5f5f5;
            font-size: 14px;
            text-align: center;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .status-message.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <header>
        <h1>Wordle БГ</h1>
        <button id="themeToggle" title="Смени тема">🌓</button>
    </header>
    <div class="container">
        <div id="board"></div>
        <div class="keyboard">
            <div class="key-row" id="row-1"></div>
            <div class="key-row" id="row-2"></div>
            <div class="key-row" id="row-3"></div>
        </div>
        <div id="statusMessage" class="status-message" aria-live="polite"></div>
        <div class="controls">
            <button id="toggleKeyboard" class="toggle-button">Смени клавиатура</button>
            <button id="openSettings" class="settings-button">Настройки</button>
        </div>
    </div>
    <div id="settingsPanel" class="settings-panel">
        <div class="settings-content">
            <h3>Настройки</h3>
            <button id="toggleKeyboardMobile" class="toggle-button">Промени клавиатура</button>
            <button id="themeToggleMobile" class="toggle-button">Промени Тема</button>
            <button id="closeSettings" class="close-settings">Затваряне</button>
        </div>
    </div>


    <div id="gameModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Поздравления!</h2>
            <p id="modalMessage"></p>
            <button onclick="location.reload()">Нова Игра</button>
        </div>
    </div>

    <script>
        // 1. Setup Variables
        let validWords = [];
        let secretWord = "";
        let gameOver = true;
        let currentRow = 0;
        let currentCol = 0;
        let currentGuess = "";

        // 2. Load Words from File
        async function initializeGame() {
            try {
                const response = await fetch('words.txt');
                const text = await response.text();
                validWords = text.split(/\r?\n/)
                                 .map(w => w.trim().toUpperCase())
                                 .filter(w => w.length === 5);
                
                if (validWords.length === 0) throw new Error("No words found");
                
                secretWord = validWords[Math.floor(Math.random() * validWords.length)];
                gameOver = false;
                console.log("Game Loaded. Secret Word: " + secretWord);
            } catch (e) {
                console.error(e);
                alert("Error loading words.txt. Make sure it is in the same folder and you are using a server.");
            }
        }
        initializeGame();

        // 3. Setup Board and Keyboard
        const board = document.getElementById("board");
        for (let r = 0; r < 6; r++) {
            for (let c = 0; c < 5; c++) {
                let tile = document.createElement("div");
                tile.id = `${r}-${c}`;
                tile.classList.add("tile");
                board.appendChild(tile);
            }
        }

        const keyboardLayouts = {
            yavert: [
                ["Я", "В", "Е", "Р", "Т", "Ъ", "Й", "Ц", "У", "К"],
                ["А", "С", "Д", "Ф", "Г", "Х", "Ж", "З", "И", "О"],
                ["ENTER", "П", "Л", "Ь", "Щ", "Ш", "Н", "М", "Б", "Ю", "Ч", "BACK"]
            ],
            second: [
                ["У", "Е", "Ш", "Щ", "З", "Х", "Ъ", "Й", "Ц", "К"],
                ["А", "С", "Д", "Ф", "Г", "Ж", "И", "О", "П", "М"],
                ["ENTER", "Я", "Ч", "С", "Т", "Ь", "Б", "Ю", "Н", "В", "BACK"]
            ]
        };

        let currentLayout = "yavert";

        function renderKeyboard(layoutName) {
            [1, 2, 3].forEach(index => {
                document.getElementById(`row-${index}`).innerHTML = "";
            });

            keyboardLayouts[layoutName].forEach((row, rowIndex) => {
                const rowEl = document.getElementById(`row-${rowIndex + 1}`);
                row.forEach(key => {
                    const btn = document.createElement("button");
                    const label = key === "ENTER" ? "↵" : key === "BACK" ? "⌫" : key;
                    btn.innerText = label;
                    btn.title = key === "ENTER" ? "Enter" : key === "BACK" ? "Backspace" : key;
                    btn.classList.add("key");
                    if (key === "ENTER" || key === "BACK") btn.classList.add("wide");
                    btn.addEventListener("click", () => handleInput(key));
                    rowEl.appendChild(btn);
                });
            });
        }

        document.getElementById("toggleKeyboard").addEventListener("click", () => {
            currentLayout = currentLayout === "yavert" ? "second" : "yavert";
            renderKeyboard(currentLayout);
        });

        document.getElementById("openSettings").addEventListener("click", () => {
            document.getElementById("settingsPanel").classList.add("show");
        });

        document.getElementById("closeSettings").addEventListener("click", () => {
            document.getElementById("settingsPanel").classList.remove("show");
        });

        document.getElementById("toggleKeyboardMobile").addEventListener("click", () => {
            currentLayout = currentLayout === "yavert" ? "second" : "yavert";
            renderKeyboard(currentLayout);
            document.getElementById("settingsPanel").classList.remove("show");
        });

        renderKeyboard(currentLayout);

        // 4. Theme Logic
        const themeToggle = document.getElementById('themeToggle');
        const themeToggleMobile = document.getElementById('themeToggleMobile');
        
        function setTheme(theme) {
            if (theme === 'light') {
                document.body.classList.add('light-mode');
                themeToggle.innerText = "🌙";
            } else {
                document.body.classList.remove('light-mode');
                themeToggle.innerText = "☀️";
            }
            localStorage.setItem('wordle-theme', theme);
        }

        // Auto-detect theme
        const savedTheme = localStorage.getItem('wordle-theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)');

        if (savedTheme) {
            setTheme(savedTheme);
        } else {
            setTheme(systemPrefersDark.matches ? 'dark' : 'light');
        }

        // Handle toggle clicks
        [themeToggle, themeToggleMobile].forEach(btn => {
            btn.addEventListener('click', () => {
                const isLight = document.body.classList.contains('light-mode');
                setTheme(isLight ? 'dark' : 'light');
            });
        });

        // 5. Input Handling

        window.addEventListener("keyup", (e) => {
            if (gameOver) return;
            if (e.key === "Enter") handleInput("ENTER");
            else if (e.key === "Backspace") handleInput("BACK");
            else if (/^[а-яА-ЯъЪьЬшШщЩчЧюЮяЯ]$/.test(e.key)) handleInput(e.key.toUpperCase());
        });

        function handleInput(key) {
            if (gameOver) return;
            if (key === "BACK") {
                if (currentCol > 0) {
                    currentCol--;
                    const tile = document.getElementById(`${currentRow}-${currentCol}`);
                    tile.innerText = "";
                    currentGuess = currentGuess.slice(0, -1);
                }
            } else if (key === "ENTER") {
                if (currentGuess.length === 5) checkWord();
                else {
                    const message = currentGuess.length === 0
                        ? "Няма въведени букви!"
                        : "Не е въведена пълна дума!";
                    showStatusMessage(message);
                }
            } else if (currentCol < 5) {
                const tile = document.getElementById(`${currentRow}-${currentCol}`);
                tile.innerText = key;
                currentGuess += key;
                currentCol++;
            }
        }

        // 5. Game Logic
        function checkWord() {
            if (!validWords.includes(currentGuess)) {
                showStatusMessage("Думата е грешна или не съществува!");
                // Reset current row for retry
                for (let i = 0; i < 5; i++) {
                    const tile = document.getElementById(`${currentRow}-${i}`);
                    tile.innerText = "";
                }
                currentCol = 0;
                currentGuess = "";
                return;
            }

            let tempSecret = secretWord.split("");
            let statuses = Array(5).fill("absent");

            // First pass: Correct letters (Green)
            for (let i = 0; i < 5; i++) {
                if (currentGuess[i] === tempSecret[i]) {
                    statuses[i] = "correct";
                    tempSecret[i] = null;
                }
            }

            // Second pass: Present letters (Yellow)
            for (let i = 0; i < 5; i++) {
                if (statuses[i] !== "correct" && tempSecret.includes(currentGuess[i])) {
                    statuses[i] = "present";
                    tempSecret[tempSecret.indexOf(currentGuess[i])] = null;
                }
            }

            // Update UI
            for (let i = 0; i < 5; i++) {
                const tile = document.getElementById(`${currentRow}-${i}`);
                tile.classList.add(statuses[i]);
                updateKeyboard(currentGuess[i], statuses[i]);
            }

            // Win/Loss
            if (currentGuess === secretWord) {
                showModal("Поздравления!", "Вие спечелихте!");
                gameOver = true;
            } else if (currentRow === 5) {
                showModal("Край на играта", "Думата беше: " + secretWord);
                gameOver = true;
            } else {
                currentRow++;
                currentCol = 0;
                currentGuess = "";
            }
        }

        function showModal(title, message) {
            document.getElementById("modalTitle").innerText = title;
            document.getElementById("modalMessage").innerText = message;
            document.getElementById("gameModal").classList.add("show");
        }

        function showStatusMessage(message) {
            const statusEl = document.getElementById("statusMessage");
            statusEl.innerText = message;
            statusEl.classList.add("show");
            clearTimeout(showStatusMessage.timeoutId);
            showStatusMessage.timeoutId = setTimeout(() => {
                statusEl.classList.remove("show");
                statusEl.innerText = "";
            }, 1400);
        }

        function updateKeyboard(letter, status) {
            const btn = Array.from(document.querySelectorAll(".key")).find(k => k.innerText === letter);
            if (btn) {
                if (status === "correct") {
                    btn.classList.remove("present", "absent");
                    btn.classList.add("correct");
                } else if (status === "present" && !btn.classList.contains("correct")) {
                    btn.classList.remove("absent");
                    btn.classList.add("present");
                } else if (status === "absent" && !btn.classList.contains("correct") && !btn.classList.contains("present")) {
                    btn.classList.add("absent");
                }
            }
        }
    </script>
</body>
</html>
